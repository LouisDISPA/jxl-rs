# Workflow to run CodSpeed performance benchmarks.

name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Limit the decode benchmark to a representative corpus so the run stays within
  # a reasonable CI duration. Keep aligned with the image set used by the
  # existing performance benchmark job in pull_request.yml. Paths must be
  # absolute because `cargo codspeed run` executes the benchmark binary from a
  # working directory other than the repository root.
  JXL_FILES: >-
    ${{ github.workspace }}/jxl/resources/test/conformance_test_images/sunset_logo.jxl,${{ github.workspace }}/jxl/resources/test/conformance_test_images/bike.jxl,${{ github.workspace }}/jxl/resources/test/green_queen_modular_e3.jxl,${{ github.workspace }}/jxl/resources/test/green_queen_vardct_e3.jxl,${{ github.workspace }}/jxl/resources/test/conformance_test_images/bicycles.jxl,${{ github.workspace }}/jxl/resources/test/conformance_test_images/delta_palette.jxl,${{ github.workspace }}/jxl/resources/test/conformance_test_images/lz77_flower.jxl,${{ github.workspace }}/jxl/resources/test/conformance_test_images/patches.jxl

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install latest rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          prefix-key: codspeed

      - name: Install cargo-codspeed
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2
        with:
          tool: cargo-codspeed@4.7.0

      - name: Build the benchmark targets
        run: cargo codspeed build

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@63f3e98b61959fe67f146a3ff022e4136fe9bb9c # v4.17.6
        with:
          mode: simulation
          run: cargo codspeed run
